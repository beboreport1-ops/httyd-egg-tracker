<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTTYD Egg Tracker — Moved</title>
<meta http-equiv="refresh" content="5;url=https://httyd-egg-track.lovable.app/">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0d;
    font-family: Inter, system-ui, sans-serif;
    color: #f3e9d8;
    text-align: center;
    padding: 20px;
  }
  .box {
    max-width: 400px;
  }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(180deg, #ffe082 0%, #f0a500 40%, #e8540a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }
  p {
    color: #8a7a66;
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  a.btn {
    display: inline-block;
    padding: 13px 28px;
    border-radius: 9px;
    border: 1.5px solid #e8540a;
    background: linear-gradient(180deg, #ff7a1f 0%, #e8540a 55%, #b53a05 100%);
    color: #fff;
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    text-decoration: none;
    box-shadow: 0 0 24px rgba(232,84,10,0.45);
  }
  .note {
    margin-top: 18px;
    font-size: 0.72rem;
    color: #5a4a36;
  }
  .countdown {
    font-size: 2.5rem;
    font-weight: 700;
    font-family: 'Cinzel', serif;
    color: #f0a500;
    margin-bottom: 20px;
    text-shadow: 0 0 12px rgba(240,165,0,0.5);
  }
</style>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap">
</head>
<body>
  <div class="box">
    <h1>🐉 HTTYD Egg Tracker</h1>
    <p>This page has moved to a new location.<br>Please update your bookmark.</p>
    <div class="countdown" id="count">5</div>
    <a class="btn" href="https://httyd-egg-track.lovable.app/">Go to New Website</a>
    <div class="note">Redirecting automatically in <span id="countNote">5</span> seconds.</div>
<script>
  let n = 5;
  const el = document.getElementById('count');
  const note = document.getElementById('countNote');
  const interval = setInterval(() => {
    n--;
    el.textContent = n;
    note.textContent = n;
    if (n <= 0) {
      clearInterval(interval);
      window.location.href = 'https://httyd-egg-track.lovable.app/';
    }
  }, 1000);
</script>
  </div>
</body>
</html>
